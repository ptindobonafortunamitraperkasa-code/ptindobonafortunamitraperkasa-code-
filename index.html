:root{
  --bg:#eef4ff;
  --bg-soft:#f7faff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#5b6b84;
  --line:#dbe7ff;
  --primary:#1d4ed8;
  --primary-dark:#1e40af;
  --primary-soft:#eaf2ff;
  --secondary:#0f172a;
  --danger:#dc2626;
  --success:#0f766e;
  --shadow:0 12px 32px rgba(29,78,216,.10);
  --shadow-soft:0 6px 18px rgba(15,23,42,.06);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial,Helvetica,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 24%),
    linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
}
.app{max-width:1320px;margin:0 auto;padding:20px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow-soft);
}
.topbar{
  padding:22px;
  display:flex;
  gap:16px;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  background:linear-gradient(135deg,#ffffff 0%,#f8fbff 100%);
}
h1,h2,h3{margin:0}
.subtitle{color:var(--muted);margin-top:6px}
.btn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  padding:11px 15px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  transition:.18s ease;
  box-shadow:none;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
.btn.primary{
  background:linear-gradient(135deg,var(--primary),#2563eb);
  color:#fff;
  border-color:transparent;
}
.btn.primary:hover{background:linear-gradient(135deg,var(--primary-dark),var(--primary))}
.btn.danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border-color:transparent}
.btn.small{padding:8px 10px;border-radius:12px;font-size:13px}
.grid{display:grid;gap:14px}
.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:16px}
.stat{
  padding:18px;
  background:linear-gradient(180deg,#ffffff 0%,#f9fbff 100%);
  border:1px solid var(--line);
}
.stat .label{color:var(--muted);font-size:14px;font-weight:600}
.stat .value{font-size:28px;font-weight:900;margin-top:8px;color:#0b3aa4}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.tab{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  color:#28405f;
  cursor:pointer;
  font-weight:700;
}
.tab.active{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;
  border-color:transparent;
}
.page{display:none}
.page.active{display:block}
.layout-3{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.layout-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card.pad{padding:18px}
label{display:block;font-size:14px;font-weight:800;margin:12px 0 6px;color:#173155}
input,select,textarea{
  width:100%;
  padding:12px 13px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  font:inherit;
  color:var(--text);
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#93c5fd;
  box-shadow:0 0 0 4px rgba(59,130,246,.12);
}
textarea{min-height:88px;resize:vertical}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{

  font-size:14px;

<div class="loading" id="loading"><div class="spinner">Memproses...</div></div>

<script src="https://unpkg.com/html5-qrcode" type="text/javascript">
document.addEventListener("click", async (e) => {
  const editBranchBtn = e.target.closest("[data-edit-branch]");
  if(editBranchBtn){
    e.preventDefault();
    e.stopPropagation();
    if(typeof editBranch === "function"){
      await editBranch(editBranchBtn.dataset.editBranch);
    }
    return;
  }

  const removeBranchBtn = e.target.closest("[data-remove-branch]");
  if(removeBranchBtn){
    e.preventDefault();
    e.stopPropagation();
    if(typeof removeBranch === "function"){
      await removeBranch(removeBranchBtn.dataset.removeBranch);
    }
    return;
  }

  const editMemberBtn = e.target.closest("[data-edit-member]");
  if(editMemberBtn){
    e.preventDefault();
    e.stopPropagation();
    if(typeof openEditMember === "function"){
      openEditMember(editMemberBtn.dataset.editMember);
    }
    return;
  }
});

document.addEventListener("click", (e) => {

  if(btn){
    e.preventDefault();
    try{
      if(typeof clearSession === "function"){ clearSession(); }
      localStorage.clear();
      sessionStorage.clear();
    }catch(err){}
    location.reload();
  }
});


document.addEventListener("change", async (e) => {
  const box = e.target.closest("[data-perm-user]");
  if(!box) return;
  const userId = box.dataset.permUser;
  const permKey = box.dataset.permKey;
  const target = (appState.staff || []).find(s => s.id === userId);
  if(!target) return;
  const nextPerms = { ...(target.permissions_json || roleTemplates[target.role] || defaultPermissionTemplate) };
  nextPerms[permKey] = box.checked;
  target.permissions_json = nextPerms;
  if(typeof saveUserPermissions === "function"){
    await saveUserPermissions(userId, nextPerms);
  }
});

function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function money(n){ return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(Number(n||0));}
function dt(v){ try { return new Date(v).toLocaleString("id-ID"); } catch(e){ return v; } }
function esc(s){ return String(s??"").replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m])); }
function tier(points, settings){
  const arr = [...(settings.tiers || [])].sort((a,b)=>a.minPoints-b.minPoints);
  let current = arr[0]?.name || "Bronze";
  arr.forEach(t=>{ if(Number(points)>=Number(t.minPoints)) current=t.name; });
  return current;
}
function qrDataUrl(text){
  try{
    if(typeof qrcode !== "undefined"){
      const qr = qrcode(0, "M");
      qr.addData(String(text || ""));
      qr.make();
      return qr.createDataURL(8, 12);
    }
  } catch(e){}
  return "";
}

function publicCardUrl(memberCode){
  const url = new URL(window.location.origin + window.location.pathname);
  url.search = "";
  url.searchParams.set(PUBLIC_CARD_PARAM, String(memberCode || ""));
  const dbUrl = appConfig?.url || DEFAULT_PUBLIC_SUPABASE_URL;
  const dbKey = appConfig?.key || DEFAULT_PUBLIC_SUPABASE_KEY;
  if(dbUrl) url.searchParams.set(PUBLIC_CARD_DB_PARAM, dbUrl);
  if(dbKey) url.searchParams.set(PUBLIC_CARD_KEY_PARAM, dbKey);
  return url.toString();
}
function extractMemberLookup(raw){
  const text = String(raw || "").trim();
  if(!text) return "";
  try{
    const url = new URL(text);
    const cardCode = url.searchParams.get(PUBLIC_CARD_PARAM);
    if(cardCode) return String(cardCode).trim();
  } catch(e){}
  return text;
}
function ensurePublicConfigIfNeeded(){
  const params = new URLSearchParams(window.location.search);
  const publicCardCode = params.get(PUBLIC_CARD_PARAM);
  const dbUrl = params.get(PUBLIC_CARD_DB_PARAM);
  const dbKey = params.get(PUBLIC_CARD_KEY_PARAM);
  if(publicCardCode && (!appConfig?.url || !appConfig?.key)){
    appConfig = {
      url: dbUrl || DEFAULT_PUBLIC_SUPABASE_URL,
      key: dbKey || DEFAULT_PUBLIC_SUPABASE_KEY
    };
  }
  return publicCardCode;
}
function renderPublicMemberCard(){
  const root = document.getElementById("root");
  const publicCode = ensurePublicConfigIfNeeded();
  if(!publicCode){
    return false;
  }
  const member = (appState.members || []).find(m => String(m.code || "").toLowerCase() === String(publicCode).toLowerCase());
  if(!member){
    root.innerHTML = `
      <div class="app">
        <div class="card pad" style="max-width:780px;margin:40px auto">
          <div class="badge">Kartu Member Digital</div>
          <h1 style="margin-top:14px">${APP_NAME}</h1>
          <div class="hint">Member dengan kode <b>${esc(publicCode)}</b> tidak ditemukan.</div>
        </div>
      </div>
    `;
    return true;
  }
  root.innerHTML = `
    <div class="app">
      <div class="card pad" style="max-width:980px;margin:30px auto">
        <div class="inline" style="justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap">
          <div>
            <div class="badge">Kartu Member Digital</div>
            <h1 style="margin-top:12px">${APP_NAME}</h1>
            <div class="subtitle">Kartu ini dapat dibuka langsung dari scan QR melalui browser HP, Google Lens, atau kamera luar aplikasi.</div>
          </div>
        </div>
        ${memberCardPremium(member)}
      </div>
    </div>
  `;
  return true;
}

function loadConfig(){ try { return JSON.parse(localStorage.getItem(CONFIG_KEY) || "null"); } catch(e){ return null; } }
function saveConfig(cfg){ localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); appConfig = cfg; }

function saveSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); session = s; }
function clearSession(){ localStorage.removeItem(SESSION_KEY); session = null; }

function notify(msg){ alert(msg); }

async function api(path, options = {}){
  if(!appConfig?.url || !appConfig?.key) throw new Error("Konfigurasi Supabase belum diisi.");
  const base = appConfig.url.replace(/\/+$/,"");
  const headers = {
    "apikey": appConfig.key,
    "Authorization": "Bearer " + appConfig.key,
    "Content-Type": "application/json",
    ...(options.headers || {})
  };
  const res = await fetch(base + "/rest/v1/" + path, { ...options, headers });
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch(e) { data = text; }
  if(!res.ok){
    throw new Error((data && (data.message || data.error_description || data.error)) || ("HTTP " + res.status));
  }
  return data;
}

function nextCode(members, settings){
  const prefix = String(settings?.memberCodePrefix || "IBF");
  const separator = String(settings?.memberCodeSeparator || "-");
  const digits = Number(settings?.memberCodeDigits || 4);
  let nextNumber = Number(settings?.nextCodeNumber || 1);
  let maxDetected = 0;
  (members || []).forEach(m => {
    const raw = String(m.code || "");
    const pattern = prefix + separator;
    const candidate = raw.startsWith(pattern) ? raw.slice(pattern.length) : raw.replace(/\D/g, "");
    const n = Number(candidate);
    if(!Number.isNaN(n) && n > maxDetected) maxDetected = n;
  });
  if(maxDetected >= nextNumber) nextNumber = maxDetected + 1;
  return prefix + separator + String(nextNumber).padStart(digits, "0");
}

async function loadAllData(){
  showLoading(true);
  try {
    const [members, transactions, vouchers, settingsRows, staff] = await Promise.all([
      api("members?select=*&order=created_at.desc"),
      api("transactions?select=*&order=created_at.desc"),
      api("vouchers?select=*&order=created_at.desc"),
      api("app_settings?select=*&limit=1"),
      api("staff_users?select=*&order=created_at.asc")
    ]);

    appState.members = (members || []).map(r => ({
      id: r.id, code: r.code, name: r.name, phone: r.phone, email: r.email || "",
      branch: r.branch, joinedAt: r.joined_at || r.created_at, points: Number(r.points || 0), totalSpend: Number(r.total_spend || 0),
      referredByCode: r.referred_by_code || "", referredByName: r.referred_by_name || ""
    }));
    appState.transactions = (transactions || []).map(r => ({
      id: r.id, memberCode: r.member_code, memberName: r.member_name, type: r.type,
      amount: Number(r.amount || 0), points: Number(r.points || 0), branch: r.branch,
      note: r.note || "", createdAt: r.created_at, cashier: r.cashier,
      referredByCode: r.referred_by_code || "", referredByName: r.referred_by_name || ""
    }));
    appState.vouchers = (vouchers || []).map(r => ({
      id: r.id, memberCode: r.member_code, memberName: r.member_name, points: Number(r.points || 0),
      value: Number(r.value || 0), createdAt: r.created_at, note: r.note || ""
    }));
    appState.staff = (staff || []).map(s => ({
      ...s,
      role: s.role || "kasir",
      permissions_json: s.permissions_json || roleTemplates[s.role || "kasir"] || defaultPermissionTemplate
    }));
    if(settingsRows && settingsRows[0]){
      const raw = settingsRows[0];
      appState.settings = {
        pointsPerAmount: Number(raw.points_per_amount || defaultSettings.pointsPerAmount),
        amountPerPoint: Number(raw.amount_per_point || defaultSettings.amountPerPoint),
        registrationBonus: Number(raw.registration_bonus || defaultSettings.registrationBonus),
        redeemRatePoints: Number(raw.redeem_rate_points || defaultSettings.redeemRatePoints),
        redeemValue: Number(raw.redeem_value || defaultSettings.redeemValue),
        memberCodePrefix: raw.member_code_prefix || defaultSettings.memberCodePrefix,
        memberCodeSeparator: raw.member_code_separator ?? defaultSettings.memberCodeSeparator,
        memberCodeDigits: Number(raw.member_code_digits || defaultSettings.memberCodeDigits),
        nextCodeNumber: Number(raw.next_code_number || defaultSettings.nextCodeNumber),
        tiers: raw.tiers_json || defaultSettings.tiers,
        branches: raw.branches_json || defaultSettings.branches
      };
    } else {
      appState.settings = defaultSettings;
    }
    if(session){
      const refreshed = appState.staff.find(s => s.username === session.username && s.password === session.password);
      if(!refreshed){ clearSession(); }
      else { saveSession({ username: refreshed.username, password: refreshed.password, role: refreshed.role, branch: refreshed.branch, permissions: refreshed.permissions_json || roleTemplates[refreshed.role] || defaultPermissionTemplate }); }
    }
  } finally {
    showLoading(false);
  }
}

function summary(){
  const members = filteredMembersForDashboard();
  const trx = filteredTransactionsForDashboard();
  return {
    totalMembers: members.length,
    totalPoints: members.reduce((s,m)=>s+Number(m.points||0),0),
    totalSpend: trx.reduce((s,t)=>s+Number(t.amount||0),0),
    todayTrx: trx.filter(t=>new Date(t.createdAt).toDateString()===new Date().toDateString()).length
  };
}

let branchChartInstance = null;
let trxChartInstance = null;

function dashboardBranchFilter(){
  return ui.dashboard?.branchFilter || "ALL";
}
function filteredMembersForDashboard(){
  return dashboardBranchFilter() === "ALL" ? (appState.members || []) : (appState.members || []).filter(m => m.branch === dashboardBranchFilter());
}
function filteredTransactionsForDashboard(){
  return dashboardBranchFilter() === "ALL" ? (appState.transactions || []) : (appState.transactions || []).filter(t => t.branch === dashboardBranchFilter());
}
function branchCounts(){
  const counts = {};
  filteredMembersForDashboard().forEach(m => {
    counts[m.branch] = (counts[m.branch] || 0) + 1;
  });
  return counts;
}

function transactionTrendLast7Days(){
  const map = {};
  const dates = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    map[key] = 0;
    dates.push(key);
  }
  filteredTransactionsForDashboard().forEach(t => {
    const key = new Date(t.createdAt).toISOString().slice(0,10);
    if(key in map) map[key] += Number(t.amount || 0);
  });
  return {
    labels: dates.map(d => {
      const dt = new Date(d);
      return dt.toLocaleDateString("id-ID",{day:"2-digit",month:"short"});
    }),
    values: dates.map(d => map[d])
  };
}

function renderDashboardCharts(){
  if(typeof Chart === "undefined") return;

  const branchCanvas = document.getElementById("branchChart");
  const trxCanvas = document.getElementById("trxChart");

  if(branchChartInstance){ branchChartInstance.destroy(); branchChartInstance = null; }
  if(trxChartInstance){ trxChartInstance.destroy(); trxChartInstance = null; }

  if(branchCanvas){
    const counts = branchCounts();
    const labels = Object.keys(counts);
    const values = Object.values(counts);
    branchChartInstance = new Chart(branchCanvas, {
      type: "doughnut",
      data: {
        labels,
        datasets: [{
          data: values,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "right" }
        }
      }
    });
  }

  if(trxCanvas){
    const trend = transactionTrendLast7Days();
    trxChartInstance = new Chart(trxCanvas, {
      type: "bar",
      data: {
        labels: trend.labels,
        datasets: [{
          label: "Omset",
          data: trend.values,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            ticks: {
              callback: (value) => "Rp " + Number(value).toLocaleString("id-ID")
            }
          }
        },
        plugins: {
          legend: { display: false }
        }
      }
    });
  }
}

async function addMember(){
  const f = ui.newMember;
  if(!f.name || !f.phone || !f.branch){ notify("Nama, nomor HP, dan cabang wajib diisi."); return; }
  try{
    showLoading(true);
    await loadAllData();
    const code = nextCode(appState.members);
    const memberPayload = {
      id: uid(), code, name: f.name, phone: f.phone, email: f.email || "",
      branch: f.branch, joined_at: new Date().toISOString(), points: Number(appState.settings.registrationBonus || 0),
      total_spend: 0, created_at: new Date().toISOString()
    };
    await api("members", { method:"POST", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify(memberPayload) });

    const bonus = {
      id: uid(), member_code: code, member_name: f.name, type:"bonus", amount:0,
      points:Number(appState.settings.registrationBonus || 0), branch:f.branch,
      note:"Bonus pendaftaran member", created_at:new Date().toISOString(),
      cashier: currentUser()?.username || "system"
    };
    await api("transactions", { method:"POST", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify(bonus) });

    ui.newMember = { name:"", phone:"", email:"", branch: currentUser()?.branch || appState.settings.branches[0] || "" };
    await loadAllData();
    notify("Member berhasil ditambahkan.");
    render();
  } catch(err){
    notify("Gagal menambah member: " + err.message);
  } finally { showLoading(false); }
}

async function submitTransaction(){
  const t = ui.trx;
  if(!t.memberCode || !t.branch){ notify("Pilih member dan cabang."); return; }
  const member = appState.members.find(m=>m.code===t.memberCode);
  if(!member){ notify("Member tidak ditemukan."); return; }
  const amount = Number(t.amount || 0);
  const refMember = (appState.members || []).find(m => m.code === t.referredByCode);
  let points = 0;
  if(t.type === "earn"){
    points = t.manualPoints ? Number(t.manualPoints) : Math.floor(amount / Number(appState.settings.amountPerPoint || 1)) * Number(appState.settings.pointsPerAmount || 1);
  } else {
    points = Number(t.manualPoints || 0);
  }

  try{
    showLoading(true);
    await api("members?id=eq." + encodeURIComponent(member.id), {
      method:"PATCH",
      headers:{ "Prefer":"return=minimal" },
      body: JSON.stringify({
        points: Number(member.points || 0) + points,
        total_spend: t.type === "earn" ? Number(member.totalSpend || 0) + amount : Number(member.totalSpend || 0)
      })
    });

    const trx = {
      id: uid(), member_code: member.code, member_name: member.name, type: t.type, amount, points,
      branch: t.branch, note: t.note || "", created_at: new Date().toISOString(),
      cashier: currentUser()?.username || "admin",
      referred_by_code: refMember?.code || "",
      referred_by_name: refMember?.name || ""
    };
    await api("transactions", { method:"POST", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify(trx) });

    ui.trx = { memberCode:"", amount:"", branch: currentUser()?.branch || appState.settings.branches[0] || "", note:"", type:"earn", manualPoints:"" };
    await loadAllData();
    notify("Transaksi berhasil disimpan.");
    render();
  } catch(err){
    notify("Gagal menyimpan transaksi: " + err.message);
  } finally { showLoading(false); }
}

async function redeemVoucher(){
  const v = ui.voucher;
  if(!v.memberCode || !v.points){ notify("Pilih member dan jumlah poin."); return; }
  const member = appState.members.find(m=>m.code===v.memberCode);
  const points = Number(v.points || 0);
  if(!member || Number(member.points || 0) < points){ notify("Poin member tidak cukup."); return; }

  const value = Math.floor(points / Number(appState.settings.redeemRatePoints || 1)) * Number(appState.settings.redeemValue || 0);
  try{
    showLoading(true);
    await api("members?id=eq." + encodeURIComponent(member.id), {
      method:"PATCH",
      headers:{ "Prefer":"return=minimal" },
      body: JSON.stringify({ points: Number(member.points || 0) - points })
    });

    const trx = {
      id: uid(), member_code: member.code, member_name: member.name, type:"redeem", amount:value, points:-points,
      branch: member.branch, note: v.note || ("Penukaran voucher " + money(value)), created_at: new Date().toISOString(),
      cashier: currentUser()?.username || "admin"
    };
    await api("transactions", { method:"POST", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify(trx) });

    const voucher = {
      id: uid(), member_code: member.code, member_name: member.name, points, value,
      created_at: new Date().toISOString(), note: v.note || "Voucher loyalty"
    };
    await api("vouchers", { method:"POST", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify(voucher) });

    ui.voucher = { memberCode:"", points:"", note:"" };
    await loadAllData();
    notify("Voucher berhasil diproses.");
    render();
  } catch(err){
    notify("Gagal proses voucher: " + err.message);
  } finally { showLoading(false); }
}

async function saveEditMember(){
  if(!ui.editMember.id){ notify("Data member tidak valid."); return; }
  if(!String(ui.editMember.name || "").trim()){ notify("Nama wajib diisi."); return; }
  if(!String(ui.editMember.phone || "").trim()){ notify("Nomor HP wajib diisi."); return; }
  if(!String(ui.editMember.branch || "").trim()){ notify("Cabang wajib diisi."); return; }
  try{
    showLoading(true);
    await api("members?id=eq." + encodeURIComponent(ui.editMember.id), {
      method:"PATCH",
      headers:{ "Prefer":"return=minimal" },
      body: JSON.stringify({
        name: String(ui.editMember.name).trim(),
        phone: String(ui.editMember.phone).trim(),
        email: String(ui.editMember.email || "").trim(),
        branch: String(ui.editMember.branch).trim()

    closeEditMember();
    notify("Data member berhasil diperbarui.");
  } catch(err){
    notify("Gagal mengubah member: " + err.message);
  } finally {
    showLoading(false);
  }
}

async function deleteMember(code){
  if(!confirm("Hapus member ini? Riwayat transaksi dan voucher member ini juga akan ikut dihapus.")) return;
  const member = appState.members.find(m=>m.code === code);
  if(!member) return;
  try{
    showLoading(true);
    await Promise.all([
      api("transactions?member_code=eq." + encodeURIComponent(code), { method:"DELETE", headers:{ "Prefer":"return=minimal" } }),
      api("vouchers?member_code=eq." + encodeURIComponent(code), { method:"DELETE", headers:{ "Prefer":"return=minimal" } }),
      api("members?id=eq." + encodeURIComponent(member.id), { method:"DELETE", headers:{ "Prefer":"return=minimal" } })
    ]);
    await loadAllData();
    render();
    notify("Member berhasil dihapus.");
  } catch(err){
    notify("Gagal hapus member: " + err.message);
  } finally { showLoading(false); }
}

async function stopCameraScanner(){
  try{
    if(qrScanner && qrScannerRunning){
      await qrScanner.stop();
      await qrScanner.clear();
    }
  } catch(e){}
  qrScannerRunning = false;
}

async function startCameraScanner(){
  const readerId = "qr-reader";
  const target = document.getElementById(readerId);
  if(!target){
    notify("Area scanner tidak ditemukan.");
    return;
  }
  if(typeof Html5Qrcode === "undefined"){
    notify("Library scan QR belum termuat. Coba refresh halaman lalu ulangi.");
    return;
  }
  await stopCameraScanner();
  qrScanner = new Html5Qrcode(readerId);
  try{
    await qrScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      async (decodedText) => {
        ui.scanInput = decodedText;
        const q = extractMemberLookup(decodedText).toLowerCase();
        const member = appState.members.find(m=>String(m.code).toLowerCase()===q || String(m.phone).toLowerCase()===q);
        if(member){
          ui.selectedMemberCode = member.code;
          ui.trx.memberCode = member.code;
          await stopCameraScanner();
          render();
          notify("QR berhasil dibaca: " + member.name);
        }
      },
      () => {}
    );
    qrScannerRunning = true;
    const status = document.getElementById("camera-status");
    if(status) status.textContent = "Kamera aktif. Arahkan ke QR member.";
  } catch(err){
    notify("Gagal mengaktifkan kamera QR: " + (err.message || err));
  }
}

function handleScan(){
  const q = String(ui.scanInput||"").trim().toLowerCase();
  const member = appState.members.find(m=>String(m.code).toLowerCase()===q || String(m.phone).toLowerCase()===q);
  if(!member){ notify("Member tidak ditemukan."); return; }
  ui.selectedMemberCode = member.code;
  ui.trx.memberCode = member.code;
  render();
}

function exportCSVFile(filename, rows){
  const csv = rows.map(r=>r.map(v=>`"${String(v??"").replaceAll('"','""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function downloadMemberCard(memberCode){
  const member = appState.members.find(m => m.code === memberCode);
  if(!member){ notify("Member tidak ditemukan."); return; }
  const win = window.open("", "_blank");
  if(!win){ notify("Pop-up diblokir browser. Izinkan pop-up dulu."); return; }
  win.document.write(`
    <html>
      <head>
        <title>Kartu Member ${member.code}</title>
        <style>
          body{font-family:Arial,sans-serif;background:#eef2ff;padding:24px}
          ${document.querySelector("style").innerHTML}
          .wrap{max-width:1280px;margin:0 auto}
        
.app-shell{

async function buildCardCanvas(member){
  if(typeof html2canvas === "undefined"){
    throw new Error("Library PNG belum termuat.");
  }
  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.left = "-99999px";
  wrapper.style.top = "0";
  wrapper.style.width = "1280px";
  wrapper.style.padding = "32px";
  wrapper.style.background = "#eef2ff";
  wrapper.innerHTML = memberCardHTML(member);
  document.body.appendChild(wrapper);
  const target = wrapper.firstElementChild;
  const canvas = await html2canvas(target, {
    backgroundColor: null,
    scale: 2,
    useCORS: true
  });
  document.body.removeChild(wrapper);
  return canvas;
}

async function downloadMemberCardPNG(memberCode){
  const member = appState.members.find(m => m.code === memberCode);
  if(!member){ notify("Member tidak ditemukan."); return; }
  try{
    const canvas = await buildCardCanvas(member);
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "kartu-member-" + member.code.toLowerCase() + ".png";
    link.click();
  } catch(err){
    notify("Gagal membuat PNG: " + err.message);
  }
}

async function downloadMemberCardPDF(memberCode){
  const member = appState.members.find(m => m.code === memberCode);
  if(!member){ notify("Member tidak ditemukan."); return; }
  try{
    const canvas = await buildCardCanvas(member);
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      orientation: "landscape",
      unit: "px",
      format: [canvas.width, canvas.height]
    });
    pdf.addImage(imgData, "PNG", 0, 0, canvas.width, canvas.height);
    pdf.save("kartu-member-" + member.code.toLowerCase() + ".pdf");
  } catch(err){
    notify("Gagal membuat PDF: " + err.message);
  }
}

async function updateSettings(field, value){
  const current = appState.settings;
  const payload = {
    id: "main",
    points_per_amount: field === "pointsPerAmount" ? Number(value || 0) : Number(current.pointsPerAmount || 0),
    amount_per_point: field === "amountPerPoint" ? Number(value || 0) : Number(current.amountPerPoint || 0),
    registration_bonus: field === "registrationBonus" ? Number(value || 0) : Number(current.registrationBonus || 0),
    redeem_rate_points: field === "redeemRatePoints" ? Number(value || 0) : Number(current.redeemRatePoints || 0),
    redeem_value: field === "redeemValue" ? Number(value || 0) : Number(current.redeemValue || 0),
    member_code_prefix: field === "memberCodePrefix" ? String(value || "") : String(current.memberCodePrefix || ""),
    member_code_separator: field === "memberCodeSeparator" ? String(value ?? "") : String(current.memberCodeSeparator || ""),
    member_code_digits: field === "memberCodeDigits" ? Number(value || 0) : Number(current.memberCodeDigits || 0),
    next_code_number: field === "nextCodeNumber" ? Number(value || 0) : Number(current.nextCodeNumber || 0),
    tiers_json: field === "tiers" ? value : current.tiers,
    branches_json: current.branches,
    updated_at: new Date().toISOString()
  };
  try{
    await api("app_settings?id=eq.main", { method:"PATCH", headers:{ "Prefer":"return=minimal" }, body: JSON.stringify(payload) });
    await loadAllData();
    render();
  } catch(err){
    notify("Gagal mengubah pengaturan: " + err.message);
  }
}

async function addBranch(){
  const input = document.getElementById("new-branch-name");
  const branch = String(input?.value || "").trim();
  if(!branch){ notify("Nama cabang wajib diisi."); return; }
  const exists = (appState.settings.branches || []).some(b => String(b).toLowerCase() === branch.toLowerCase());
  if(exists){ notify("Cabang sudah ada."); return; }
  await saveBranches([...(appState.settings.branches || []), branch]);
}

async function removeBranch(branch){
  const currentBranches = appState.settings.branches || [];
  if(currentBranches.length <= 1){ notify("Minimal harus ada 1 cabang."); return; }
  const used = appState.members.some(m => m.branch === branch) || appState.transactions.some(t => t.branch === branch);
  if(used){
    notify("Cabang ini sudah dipakai data member/transaksi. Ubah dulu data yang memakai cabang ini sebelum menghapus.");
    return;
  }
  await saveBranches(currentBranches.filter(b => b !== branch));
}

async function editBranch(oldBranch){
  const newBranch = prompt("Ubah nama cabang:", oldBranch);
  if(newBranch === null) return;
  const trimmed = String(newBranch).trim();
  if(!trimmed){
    notify("Nama cabang tidak boleh kosong.");
    return;
  }
  const currentBranches = appState.settings?.branches || [];
  if(currentBranches.some(b => String(b).toLowerCase() === trimmed.toLowerCase() && b !== oldBranch)){
    notify("Nama cabang sudah ada.");
    return;
  }
  try{
    showLoading(true);

    const updatedBranches = currentBranches.map(b => b === oldBranch ? trimmed : b);
    await saveBranches(updatedBranches);

    for(const m of (appState.members || []).filter(m => m.branch === oldBranch)){
      await api("members?id=eq." + encodeURIComponent(m.id), {
        method:"PATCH",
        headers:{ "Prefer":"return=minimal" },
        body: JSON.stringify({ branch: trimmed })
      });
    }

    for(const t of (appState.transactions || []).filter(t => t.branch === oldBranch)){
      await api("transactions?id=eq." + encodeURIComponent(t.id), {
        method:"PATCH",
        headers:{ "Prefer":"return=minimal" },
        body: JSON.stringify({ branch: trimmed })
      });
    }

    for(const s of (appState.staff || []).filter(s => s.branch === oldBranch)){
      await api("staff_users?id=eq." + encodeURIComponent(s.id), {
        method:"PATCH",
        headers:{ "Prefer":"return=minimal" },
        body: JSON.stringify({ branch: trimmed })
      });
    }

    await loadAllData();
    render();
    notify("Nama cabang berhasil diubah.");
  } catch(err){
    notify("Gagal mengubah cabang: " + err.message);
  } finally {
    showLoading(false);
  }
}

          ${[
            ...(canAccess("dashboard") ? [["dashboard","Dashboard"]] : []),
            ...(canAccess("members") ? [["members","Member"]] : []),
            ...(canAccess("transactions") ? [["transactions","Transaksi"]] : []),
            ...(canAccess("voucher") ? [["voucher","Voucher"]] : []),
            ...(canAccess("scanner") ? [["scanner","Scan QR"]] : []),
            ...(canAccess("settings") ? [["settings","Setting"]] : [])

            <button class="nav-btn ${ui.activeTab===key ? 'active' : ''}" data-tab="${key}">

              <span>${label}</span>
            </button>
          `).join("")}
        </div>
        <div class="sidebar-footer">
          <button class="btn" id="logout-side" data-logout="1">Logout</button>
        </div>
      </aside>

      <div class="main-pro">
        <div class="card topbar">
          <div>
            <h1>Fortuna Helmet Member Online</h1>
            <div class="subtitle">Login sebagai <b>${esc(user.username)}</b> · ${esc(user.role)} · Cabang ${esc(user.branch)}</div>
          </div>
          <div class="inline">
            ${canAccess("export") ? `
            <select id="export-member-branch" style="max-width:220px">
              <option value="ALL">Export Member - Semua</option>
              ${branches.map(b=>`<option value="${esc(b)}">Member - ${esc(b)}</option>`).join("")}
            </select>
            <button class="btn" id="export-members">Export Member</button>
            <select id="export-transaction-branch" style="max-width:220px">
              <option value="ALL">Export Transaksi - Semua</option>
              ${branches.map(b=>`<option value="${esc(b)}">Transaksi - ${esc(b)}</option>`).join("")}
            </select>
            <button class="btn" id="export-transactions">Export Transaksi</button>
            ` : ``}
            <button class="btn" id="setup-again">Setup Ulang</button>
          </div>
        </div>

        ${(canAccess("dashboard") && ui.activeTab==='dashboard') ? `
          <div class="card dashboard-hero">
            <h2>Halo Admin <b>Fortuna Helmet</b></h2>
            <div class="subtitle">Lihat sekilas statistik dari member dan transaksi di Fortuna Helmet.</div>
          </div>

          <div class="kpi-row">
            <div class="card kpi-card">
              <div>
                <div class="kpi-value">${money(sum.totalSpend)}</div>
                <div class="kpi-sub">Omset</div>
                <div class="kpi-growth">▲ Akumulasi seluruh transaksi</div>
              </div>
              <div style="font-size:42px">📈</div>
            </div>
            <div class="card kpi-card">
              <div>
                <div class="kpi-value">${sum.totalMembers}</div>
                <div class="kpi-sub">Total Member</div>
                <div class="kpi-growth">▲ Data member aktif</div>
              </div>
              <div style="font-size:42px">👥</div>
            </div>
            <div class="card kpi-card">
              <div>
                <div class="kpi-value">${sum.todayTrx}</div>
                <div class="kpi-sub">Transaksi Hari Ini</div>
                <div class="kpi-growth">▲ Aktivitas cabang hari ini</div>
              </div>
              <div style="font-size:42px">🧾</div>
            </div>
          </div>

            <div class="card chart-card">
              <div class="toolbar-row">
                <h2>Member Berdasarkan Cabang</h2>
                <div class="inline">
                  <select id="dashboard-branch-filter" style="max-width:220px">
                    <option value="ALL" ${ui.dashboard.branchFilter==='ALL'?'selected':''}>Semua Cabang</option>
                    ${branches.map(b=>`<option value="${esc(b)}" ${ui.dashboard.branchFilter===b?'selected':''}>${esc(b)}</option>`).join("")}
                  </select>
                  <span class="badge">Ringkasan</span>
                </div>
              </div>
              <div class="chart-wrap"><canvas id="branchChart"></canvas></div>
            </div>
            <div class="card chart-card">
              <div class="toolbar-row">
                <h2>Laporan Transaksi</h2>
                <div class="hint">Mengikuti filter cabang yang dipilih di grafik member.</div>
              </div>
              <div class="chart-wrap"><canvas id="trxChart"></canvas></div>
            </div>
          </div>

          <div class="card pad">
            <div class="toolbar-row" style="margin-bottom:12px">
              <h2>Transaksi Terbaru</h2>
              <div class="inline">
                <select style="max-width:180px">
                  <option>Semua Cabang</option>
                  ${branches.map(b=>`<option>${esc(b)}</option>`).join("")}
                </select>
                <button class="btn primary" id="export-transactions-inline">Export</button>

                  <td>${esc(t.memberCode)}</td>
                  <td>${dt(t.createdAt)}</td>
                  <td>${money(t.amount)}</td>
                  <td>${esc(t.cashier)}</td>
                  <td><span class="badge">${esc(t.branch)}</span></td>
                  <td><button class="btn small">Lihat</button></td>
                </tr>`).join("")}
              </tbody>
            </table></div>
          </div>

function render(){
  if(ui.activeTab !== "scanner"){
    stopCameraScanner();
  }
  const publicCode = ensurePublicConfigIfNeeded();
  if(publicCode){
    if(!appConfig?.url || !appConfig?.key){
      renderSetup("");
      return;
    }
    if((appState.members || []).length){
      renderPublicMemberCard();
      return;
    }
  }
  if(!appConfig?.url || !appConfig?.key){
    renderSetup("");
  } else {
    renderApp();
  }
}

render();
if((appConfig?.url && appConfig?.key) || new URLSearchParams(window.location.search).get(PUBLIC_CARD_PARAM)){
  initializeIfNeeded();
}
</script>
