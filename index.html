<script>
function nextCode(members, settings){
  const prefix = settings?.memberCodePrefix || "IBF";
  const separator = settings?.memberCodeSeparator || "-";
  const digits = settings?.memberCodeDigits || 4;

  let max = 0;

  (members || []).forEach(m => {
    const raw = String(m.code || "");
    const num = raw.replace(/\D/g, "");
    const n = Number(num);
    if(!isNaN(n) && n > max) max = n;
  });

  const next = max + 1;

  return prefix + separator + String(next).padStart(digits, "0");
}
